<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>daum.pw Admin</title>
<style>
:root{--font:'Segoe UI',system-ui,-apple-system,sans-serif;--radius:12px;--radius-sm:8px;--transition:.25s ease}
[data-theme="dark"]{--bg:#0f0f12;--surface:rgba(255,255,255,.05);--surface2:rgba(255,255,255,.08);--border:rgba(255,255,255,.08);--text:#f0f0f2;--text-dim:rgba(240,240,242,.5);--accent:#F5B842;--accent-soft:rgba(245,184,66,.12);--danger:#e55;--danger-soft:rgba(238,85,85,.12);--input-bg:rgba(255,255,255,.06)}
[data-theme="light"]{--bg:#f8f6f1;--surface:rgba(255,255,255,.7);--surface2:rgba(255,255,255,.9);--border:rgba(0,0,0,.08);--text:#1a1a1a;--text-dim:rgba(26,26,26,.45);--accent:#D4920B;--accent-soft:rgba(212,146,11,.1);--danger:#c33;--danger-soft:rgba(204,51,51,.1);--input-bg:rgba(0,0,0,.04)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 80px}
a{color:var(--accent);text-decoration:none}

/* Header */
.header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;background:var(--bg);z-index:100}
.header h1{font-size:20px;font-weight:700}
.header h1 span{color:var(--accent)}
.header-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.header-divider{width:1px;height:20px;background:var(--border)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;transition:var(--transition);font-family:var(--font)}
.btn:hover{background:var(--surface2)}
.btn-accent{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.btn-accent:hover{opacity:.85}
.btn-danger{color:var(--danger);border-color:var(--danger)}
.btn-danger:hover{background:var(--danger-soft)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:6px 8px;font-size:16px;line-height:1}

/* Tabs */
.tabs{display:flex;gap:4px;padding:12px 24px;border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:8px 16px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--text-dim);font-size:14px;cursor:pointer;transition:var(--transition);font-family:var(--font);white-space:nowrap}
.tab:hover{color:var(--text);background:var(--surface)}
.tab.active{color:var(--accent);background:var(--accent-soft);font-weight:600}

/* Main */
.main{max-width:960px;margin:0 auto;padding:20px 24px}

/* Table */
.table-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.table-header h2{font-size:16px;font-weight:600}
.item-count{font-size:13px;color:var(--text-dim)}
.items{display:flex;flex-direction:column;gap:8px}
.item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;transition:var(--transition)}
.item:hover{border-color:var(--accent);background:var(--surface2)}
.item-row{display:flex;align-items:center;gap:10px}
.item-num{font-size:12px;color:var(--text-dim);font-weight:600;min-width:28px}
.item-fields{flex:1;display:flex;flex-wrap:wrap;gap:6px 12px;align-items:center}
.item-fields span{font-size:13px}
.item-field-name{font-weight:600;color:var(--accent)}
.item-field-val{color:var(--text)}
.item-field-dim{color:var(--text-dim);font-size:12px}
.item-actions{display:flex;gap:4px;flex-shrink:0}
.item-tags{display:flex;gap:4px;flex-wrap:wrap}
.item-tag{background:var(--accent-soft);color:var(--accent);padding:2px 8px;border-radius:999px;font-size:11px}

/* Edit Form */
.edit-form{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.form-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.form-label{font-size:12px;color:var(--text-dim);min-width:60px}
.form-input{flex:1;min-width:120px;padding:7px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:var(--transition)}
.form-input:focus{border-color:var(--accent)}
textarea.form-input{resize:vertical;min-height:60px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}

/* Empty state */
.empty{text-align:center;padding:48px 16px;color:var(--text-dim)}
.empty p{margin-bottom:16px}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent);color:#000;padding:10px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;transition:.3s ease;z-index:999;opacity:0;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Theme toggle */
.theme-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.theme-btn:hover{background:var(--surface2)}

/* Responsive */
@media(max-width:640px){
.header{padding:14px 16px}
.tabs{padding:8px 16px}
.main{padding:16px}
.item{padding:10px 12px}
.item-fields{flex-direction:column;gap:2px}
.form-row{flex-direction:column;align-items:stretch}
.form-label{min-width:auto}
}
</style>
</head>
<body>

<div class="header">
  <h1><span>daum.pw</span> Admin</h1>
  <span style="font-size:12px;color:var(--text-dim)">data/</span>
  <div class="header-actions">
    <button class="btn btn-accent" id="saveBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      保存
    </button>
    <div class="header-divider"></div>
    <button class="theme-btn" id="themeBtn" title="切换主题">&#9790;</button>
  </div>
</div>

<div class="tabs" id="tabs">
  <button class="tab active" data-tab="projects">Projects</button>
  <button class="tab" data-tab="timeline">Timeline</button>
  <button class="tab" data-tab="signatures">Signatures</button>
</div>

<div class="main" id="main"></div>

<div class="toast" id="toast"></div>

<script>
const SCHEMAS = {
  projects: {
    label: '项目列表',
    fields: [
      { key: 'num', label: '编号', type: 'text', width: '80px' },
      { key: 'name', label: '名称', type: 'text' },
      { key: 'desc', label: '描述', type: 'text' },
      { key: 'url', label: '链接', type: 'url' },
      { key: 'status', label: '状态', type: 'text', width: '120px' },
      { key: 'off', label: '停用', type: 'checkbox' },
    ],
    newTemplate: { num: '', name: '', desc: '', url: '', status: '' },
  },
  timeline: {
    label: '特别感谢与收藏',
    fields: [
      { key: 'num', label: '编号', type: 'text', width: '80px' },
      { key: 'title', label: '标题', type: 'text' },
      { key: 'desc', label: '描述', type: 'textarea' },
      { key: 'tags', label: '标签', type: 'tags' },
    ],
    newTemplate: { num: '', title: '', desc: '', tags: [] },
  },
  signatures: {
    label: '签名语',
    fields: [
      { key: 'line1', label: '第一行', type: 'text' },
      { key: 'line2', label: '第二行', type: 'text' },
    ],
    newTemplate: { line1: '', line2: '' },
  },
};

const state = {
  tab: 'projects',
  data: { projects: [], timeline: [], signatures: [] },
  editingIndex: null,
  adding: false,
};

// --- Utils ---
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function deepClone(obj) {
  return JSON.parse(JSON.stringify(obj));
}

// --- Theme ---
const html = document.documentElement;
const themeBtn = document.getElementById('themeBtn');
function initTheme() {
  const saved = localStorage.getItem('admin-theme');
  if (saved) html.setAttribute('data-theme', saved);
  updateThemeBtn();
}
function updateThemeBtn() {
  themeBtn.innerHTML = html.getAttribute('data-theme') === 'dark' ? '&#9790;' : '&#9728;';
}
themeBtn.addEventListener('click', () => {
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('admin-theme', next);
  updateThemeBtn();
});
initTheme();

// --- API: auto load / save ---
async function loadAll() {
  let loaded = 0;
  for (const name of Object.keys(SCHEMAS)) {
    try {
      const res = await fetch(`/api/data/${name}.json`);
      if (res.ok) {
        const json = await res.json();
        state.data[name] = Array.isArray(json) ? json : [];
        loaded++;
      }
    } catch {}
  }
  render();
  toast(`已加载 ${loaded} 个文件`);
}

async function saveAll() {
  try {
    for (const name of Object.keys(SCHEMAS)) {
      const res = await fetch(`/api/data/${name}.json`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(state.data[name], null, 2),
      });
      if (!res.ok) {
        const message = await res.text();
        throw new Error(`${name}: ${res.status} ${message}`);
      }
    }
    toast('已保存全部文件');
  } catch (e) {
    toast('保存失败: ' + e.message);
  }
}

document.getElementById('saveBtn').addEventListener('click', saveAll);

// Auto load on open
loadAll();

// --- Tabs ---
document.getElementById('tabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  state.tab = tab.dataset.tab;
  state.editingIndex = null;
  state.adding = false;
  render();
});

// --- Render ---
function render() {
  const tab = state.tab;
  const schema = SCHEMAS[tab];
  const items = state.data[tab];
  const main = document.getElementById('main');

  let html = `
    <div class="table-header">
      <h2>${schema.label}</h2>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="item-count">${items.length} 条</span>
        <button class="btn btn-accent btn-sm" onclick="startAdd()">+ 新增</button>
      </div>
    </div>
  `;

  if (items.length === 0 && !state.adding) {
    html += `<div class="empty"><p>暂无数据</p><button class="btn btn-accent" onclick="startAdd()">+ 新增第一条</button></div>`;
  }

  html += '<div class="items">';

  // Add form
  if (state.adding) {
    html += renderForm(-1, deepClone(schema.newTemplate), true);
  }

  items.forEach((item, i) => {
    if (state.editingIndex === i) {
      html += renderForm(i, deepClone(item), false);
    } else {
      html += renderItem(item, i);
    }
  });

  html += '</div>';
  main.innerHTML = html;
}

function renderItem(item, index) {
  const schema = SCHEMAS[state.tab];
  const fields = schema.fields.map(f => {
    const val = item[f.key];
    if (f.type === 'checkbox') {
      return val ? `<span class="item-field-dim">[停用]</span>` : '';
    }
    if (f.type === 'tags' && Array.isArray(val)) {
      return `<div class="item-tags">${val.map(t => `<span class="item-tag">${esc(t)}</span>`).join('')}</div>`;
    }
    return `<span class="item-field-val">${esc(String(val ?? ''))}</span>`;
  }).join('');

  return `
    <div class="item">
      <div class="item-row">
        <span class="item-num">#${index + 1}</span>
        <div class="item-fields">${fields}</div>
        <div class="item-actions">
          <button class="btn btn-sm" onclick="moveItem(${index},-1)" title="上移">&#9650;</button>
          <button class="btn btn-sm" onclick="moveItem(${index},1)" title="下移">&#9660;</button>
          <button class="btn btn-sm" onclick="startEdit(${index})">编辑</button>
          <button class="btn btn-sm btn-danger" onclick="deleteItem(${index})">删除</button>
        </div>
      </div>
    </div>
  `;
}

function renderForm(index, item, isNew) {
  const schema = SCHEMAS[state.tab];
  const fields = schema.fields.map(f => {
    const val = item[f.key];
    if (f.type === 'checkbox') {
      return `<div class="form-row"><span class="form-label">${f.label}</span><label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" id="f_${f.key}" ${val ? 'checked' : ''}> 停用</label></div>`;
    }
    if (f.type === 'tags') {
      const tagStr = Array.isArray(val) ? val.join(', ') : '';
      return `<div class="form-row"><span class="form-label">${f.label}</span><input class="form-input" id="f_${f.key}" value="${esc(tagStr)}" placeholder="用逗号分隔"></div>`;
    }
    if (f.type === 'textarea') {
      return `<div class="form-row"><span class="form-label">${f.label}</span><textarea class="form-input" id="f_${f.key}">${esc(val ?? '')}</textarea></div>`;
    }
    return `<div class="form-row"><span class="form-label">${f.label}</span><input class="form-input" id="f_${f.key}" value="${esc(val ?? '')}" type="${f.type}"></div>`;
  }).join('');

  return `
    <div class="item" style="border-color:var(--accent)">
      <div class="edit-form">
        ${fields}
        <div class="form-actions">
          <button class="btn" onclick="cancelEdit()">取消</button>
          <button class="btn btn-accent" onclick="saveItem(${index}, ${isNew})">${isNew ? '添加' : '保存'}</button>
        </div>
      </div>
    </div>
  `;
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// --- CRUD ---
function startAdd() {
  state.adding = true;
  state.editingIndex = null;
  render();
}

function startEdit(index) {
  state.editingIndex = index;
  state.adding = false;
  render();
}

function cancelEdit() {
  state.editingIndex = null;
  state.adding = false;
  render();
}

function saveItem(index, isNew) {
  const schema = SCHEMAS[state.tab];
  const item = !isNew && state.data[state.tab][index]
    ? deepClone(state.data[state.tab][index])
    : {};

  schema.fields.forEach(f => {
    const el = document.getElementById('f_' + f.key);
    if (!el) return;
    if (f.type === 'checkbox') {
      item[f.key] = el.checked;
    } else if (f.type === 'tags') {
      item[f.key] = el.value.split(',').map(s => s.trim()).filter(Boolean);
    } else {
      item[f.key] = el.value;
    }
  });

  if (isNew) {
    state.data[state.tab].push(item);
    toast('已添加');
  } else {
    state.data[state.tab][index] = item;
    toast('已保存');
  }
  state.editingIndex = null;
  state.adding = false;
  render();
}

function deleteItem(index) {
  if (!confirm('确定删除这条数据？')) return;
  state.data[state.tab].splice(index, 1);
  toast('已删除');
  state.editingIndex = null;
  render();
}

function moveItem(index, dir) {
  const arr = state.data[state.tab];
  const target = index + dir;
  if (target < 0 || target >= arr.length) return;
  [arr[index], arr[target]] = [arr[target], arr[index]];
  render();
}

</script>
</body>
</html>
